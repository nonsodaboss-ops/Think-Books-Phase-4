<!DOCTYPE html>
<html>
<head>
  <title>Book Details</title>
</head>
<body>
  <h2 id="title"></h2>
  <p id="author"></p>
  <p id="description"></p>
  <p>Average Rating: <span id="averageRating"></span></p>

  <input type="number" id="rating" min="1" max="5" />
  <button id="submitRating">Submit Rating</button>

  <script>
    const bookId = new URLSearchParams(window.location.search).get("id");

    async function loadBook() {
      const res = await fetch(`/api/books/${bookId}`);
      const book = await res.json();
      document.getElementById("title").textContent = book.title;
      document.getElementById("author").textContent = book.author;
      document.getElementById("description").textContent = book.description;
      document.getElementById("averageRating").textContent = book.averageRating;
    }

    document.getElementById("submitRating").addEventListener("click", async () => {
      const rating = document.getElementById("rating").value;
      await fetch(`/api/books/${bookId}/rate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ rating }),
      });
      loadBook(); // refresh details
    });

    loadBook();
  </script>
</body>
</html>
